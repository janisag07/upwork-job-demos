<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp Business Monitor &mdash; Action Alert System</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ─── TOP BAR ─── -->
<header class="topbar">
  <div class="topbar-left">
    <div class="logo">
      <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
      <span>WA Monitor</span>
    </div>
    <nav class="topbar-nav">
      <button class="nav-btn active" data-view="dashboard">Dashboard</button>
      <button class="nav-btn" data-view="threads">Threads</button>
      <button class="nav-btn" data-view="escalations">Escalations</button>
    </nav>
  </div>
  <div class="topbar-right">
    <div class="status-pill live"><span class="pulse"></span> Live</div>
    <div class="topbar-time" id="clock"></div>
  </div>
</header>

<!-- ─── MAIN LAYOUT ─── -->
<main class="app">

  <!-- ════════ DASHBOARD VIEW ════════ -->
  <section class="view view--dashboard active" id="view-dashboard">

    <!-- KPI row -->
    <div class="kpi-row">
      <div class="kpi-card">
        <span class="kpi-label">Open Threads</span>
        <span class="kpi-value" id="kpi-open">47</span>
        <span class="kpi-delta up">+5 last hr</span>
      </div>
      <div class="kpi-card kpi-warn">
        <span class="kpi-label">SLA Breaches</span>
        <span class="kpi-value" id="kpi-sla">3</span>
        <span class="kpi-delta down">2 critical</span>
      </div>
      <div class="kpi-card">
        <span class="kpi-label">Pending Actions</span>
        <span class="kpi-value" id="kpi-actions">12</span>
        <span class="kpi-delta neutral">4 auto-assigned</span>
      </div>
      <div class="kpi-card kpi-danger">
        <span class="kpi-label">Escalations</span>
        <span class="kpi-value" id="kpi-esc">2</span>
        <span class="kpi-delta down">1 overdue</span>
      </div>
    </div>

    <!-- Two-column body -->
    <div class="dash-body">

      <!-- Left: Alerts Feed -->
      <div class="panel alerts-panel">
        <div class="panel-header">
          <h2>Alerts Feed</h2>
          <div class="filter-pills">
            <button class="pill active" data-filter="all">All</button>
            <button class="pill" data-filter="critical">Critical</button>
            <button class="pill" data-filter="warning">Warning</button>
            <button class="pill" data-filter="info">Info</button>
          </div>
        </div>
        <ul class="alerts-list" id="alerts-list">
          <!-- populated by JS -->
        </ul>
      </div>

      <!-- Right: Priority Breakdown + SLA gauge -->
      <div class="dash-right">
        <div class="panel priority-panel">
          <div class="panel-header"><h2>Priority Breakdown</h2></div>
          <div class="priority-bars" id="priority-bars">
            <!-- JS -->
          </div>
        </div>
        <div class="panel sla-panel">
          <div class="panel-header"><h2>SLA Health</h2></div>
          <div class="sla-gauges" id="sla-gauges">
            <!-- JS -->
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- ════════ THREADS VIEW ════════ -->
  <section class="view view--threads" id="view-threads">
    <div class="threads-toolbar">
      <h2>Thread Triage</h2>
      <div class="filter-pills">
        <button class="pill active" data-triage="all">All</button>
        <button class="pill" data-triage="new">New</button>
        <button class="pill" data-triage="in-progress">In Progress</button>
        <button class="pill" data-triage="waiting">Waiting</button>
        <button class="pill" data-triage="resolved">Resolved</button>
      </div>
    </div>
    <div class="threads-split">
      <div class="threads-list" id="threads-list"></div>
      <div class="thread-detail" id="thread-detail">
        <div class="thread-detail-empty">Select a thread to view details and extracted actions.</div>
      </div>
    </div>
  </section>

  <!-- ════════ ESCALATIONS VIEW ════════ -->
  <section class="view view--escalations" id="view-escalations">
    <div class="esc-header">
      <h2>Escalation Queue</h2>
      <span class="badge badge-danger" id="esc-count">2 active</span>
    </div>
    <div class="esc-list" id="esc-list"></div>
  </section>

</main>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
